syntax = "proto3";
package relayer.provers.lcp;

import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/datachainlab/lcp-go/relay/elcupdater/grpc";
option (gogoproto.goproto_getters_all) = false;

// Height represents IBC height with revision number and revision height
message Height {
  uint64 revision_number = 1;
  uint64 revision_height = 2;
}

// UpdateClientResult represents the result of updateClient operation
message UpdateClientResult {
  bytes message = 1;
  bytes signature = 2;
}

// ELCUPdateRecord represents a updateClient record
message ELCUpdateRecord {
  string chain_id = 1;
  string counterparty_chain_id = 2;
  Height from_height = 3;
  Height to_height = 4;
  google.protobuf.Timestamp updated_at = 5 [(gogoproto.nullable) = false, (gogoproto.stdtime) = true];
  repeated UpdateClientResult update_client_results = 6;
  // This contains the Header that was used as latestFinalizedHeader in setupHeadersForUpdate
  bytes latest_finalized_header = 7;
}

// GetLatestRecordRequest represents a request to get the latest ELCUpdateRecord for a chain
message GetLatestRecordRequest {
  string chain_id = 1;
  string counterparty_chain_id = 2; // empty string ok
  string request_id = 3; // Optional request ID for tracing
}

// GetLatestRecordResponse represents a response containing the latest ELCUpdateRecord
message GetLatestRecordResponse {
  ELCUpdateRecord record = 1; // nil if no record found
  bool found = 2;        // true if record was found
}

// GetSequentialRecordRequest represents a request to get sequential ELCUPdateRecords from a starting height
message GetSequentialRecordsRequest {
  string chain_id = 1;
  string counterparty_chain_id = 2;
  Height from_height = 3;
  Height to_height = 4; // optional
  string request_id = 5; // Optional request ID for tracing
}

// GetSequenceResponse represents a response containing sequential ELCUPdateRecords
message GetSequentialRecordsResponse {
  repeated ELCUpdateRecord records = 1; // Sequential records in chronological order
  int32 records_count = 2;         // Number of records found
}

// ELCUpdaterService provides operations for ELCUpdateRecords
service ELCUpdaterService {
  // GetLatestRecord retrieves the last ELCUPdateRecord for a specific chain
  rpc GetLatestRecord(GetLatestRecordRequest) returns (GetLatestRecordResponse);
  
  // GetSequentialRecords retrieves sequential ELCUpdateRecords starting from the specified height
  // Returns records in chronological order where each record's FromHeight matches the previous record's ToHeight
  rpc GetSequentialRecords(GetSequentialRecordsRequest) returns (GetSequentialRecordsResponse);
}

